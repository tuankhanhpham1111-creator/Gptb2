<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Giải phương trình bậc hai</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #121212;
      color: #e0e0e0;
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }
    h1 {
      text-align: center;
      color: #ffffff;
    }
    label {
      margin-top: 10px;
      display: block;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      background-color: #1e1e1e;
      color: #ffffff;
      border: 1px solid #333;
      border-radius: 4px;
    }
    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      background-color: #03a9f4;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background-color: #0288d1;
    }
    #result {
      margin-top: 20px;
      font-weight: bold;
      color: #ffeb3b;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <h1>Giải phương trình bậc hai</h1>
  <label>Hệ số a: <input type="number" id="a" /></label>
  <label>Hệ số b: <input type="number" id="b" /></label>
  <label>Hệ số c: <input type="number" id="c" /></label>
  <button onclick="solve()">Giải phương trình</button>
  <div id="result"></div>

  <script>
    function solve() {
      const a = parseFloat(document.getElementById('a').value);
      const b = parseFloat(document.getElementById('b').value);
      const c = parseFloat(document.getElementById('c').value);
      const result = document.getElementById('result');

      if (isNaN(a) || isNaN(b) || isNaN(c)) {
        result.innerHTML = "Vui lòng nhập đầy đủ các hệ số.";
        return;
      }

      if (a === 0) {
        result.innerHTML = "Đây không phải là phương trình bậc hai.";
        return;
      }

      const delta = b * b - 4 * a * c;
      let output = `Δ = ${delta}\n`;

      if (delta < 0) {
        output += "Phương trình vô nghiệm.";
      } else if (delta === 0) {
        const x = -b / (2 * a);
        output += "Phương trình có nghiệm kép:\n";
        output += `x = ${x}`;
      } else {
        const x1 = (-b + Math.sqrt(delta)) / (2 * a);
        const x2 = (-b - Math.sqrt(delta)) / (2 * a);
        output += "Phương trình có hai nghiệm phân biệt:\n";
        output += `x₁ = ${x1}\n`;
        output += `x₂ = ${x2}`;
      }

      result.innerHTML = output;
    }
  </script>
</body>
</html>
